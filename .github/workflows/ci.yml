name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Python and container build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Compile application modules
        run: python -m compileall app scripts

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Build Docker image
        run: docker build -t securecallops:${{ github.sha }} .
